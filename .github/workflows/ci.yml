name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.63.2

      - name: Lint
        run: pixi run lint

      - name: Format check
        run: pixi run format-check

      - name: Type check
        run: pixi run typecheck

      - name: Test
        run: pixi run test

      - name: Doc staleness check
        run: pixi run doc-check
